<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Scholarships</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="govt-banner">
                <img src="digiindia.png" alt="Government of India">
            </div>
            <div class="language-translator">
                <select>
                    <option value="en">English</option>
                    <option value="hi">Hindi</option>
                    <option value="te">Telugu</option>
                    <option value="ta">Tamil</option>
                    <option value="ml">Malayalam</option>
                    <option value="kn">Kannada</option>
                </select>
            </div>
        </div>
        <nav class="navbar">
            <div class="logo">
                <img src="logo1.png" alt="Scholarship Hub Logo">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Scholarship Types</a>
                    <div class="dropdown-content">
                        <a href="international.html">International</a>
                        <a href="national.html">National</a>
                        <a href="state.html">State</a>
                        <a href="private.html">Private</a>
                    </div>
                </li>
                <li><a href="#">Scholarship Status</a></li>
                <li><a href="#">Announcements</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Helpdesk</a>
                    <div class="dropdown-content">
                        <a href="#">FAQs</a>
                        <a href="#">Contact</a>
                    </div>
                </li>
            </ul>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <button>Search</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="scholarship-selection">
            <h2>Private Scholarships</h2>
            <form id="scholarship-form">
                <select id="scholarship-select">
                    <option value="tata_scholarships">Tata Scholarships</option>
                    <option value="aditya_birla">Aditya Birla Scholarships</option>
                    <option value="infosys">Infosys Foundation Scholarships</option>
                    <option value="reliance">Reliance Foundation Scholarships</option>
                    <option value="hdfc">HDFC Bank Scholarships</option>
                    <!-- Add more private scholarships here -->
                </select>
                <button type="submit">Go</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Copy Right Policy | Privacy Policy | Terms and Conditions | Disclaimer | HyperLink | Site Map</p>
    </footer>

    <script>
        document.getElementById('scholarship-form').addEventListener('submit', function (event) {
            event.preventDefault();
            var select = document.getElementById('scholarship-select');
            var selectedValue = select.value;
            var url = '';

            switch (selectedValue) {
                case 'tata_scholarships':
                    url = 'https://www.tatatrusts.org/our-work/education/individual-grants-programme';
                    break;
                case 'aditya_birla':
                    url = 'https://www.adityabirla.com/sustainability/education-scholarship-programme';
                    break;
                case 'infosys':
                    url = 'https://www.infosys.com/infosys-foundation/programs/education/';
                    break;
                case 'reliance':
                    url = 'https://www.reliancefoundation.org/education';
                    break;
                case 'hdfc':
                    url = 'https://www.hdfcbank.com/personal/learning/scholarships';
                    break;
                // Add more cases here
                default:
                    url = '#';
            }

            window.location.href = url;
        });
    </script>
</body>
</html>
